seed: 42

models:
  separate: True
  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net_layer_1
        input: STATES
        layers: [128]
        activations: relu
      - name: net_layer_2
        input: net_layer_1
        layers: [128]
        activations: relu
      - name: net_output_layer
        input: net_layer_2
        layers: [self.num_actions]
    output: torch.tanh(ACTIONS)
  critic_1:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES
        layers: [128, 128]
        activations: relu
    output: ONE
  critic_2:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES
        layers: [128, 128]
        activations: relu
    output: ONE
  target_critic_1:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES
        layers: [128, 128]
        activations: relu
    output: ONE
  target_critic_2:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES
        layers: [128, 128]
        activations: relu
    output: ONE

memory:
  class: RandomMemory
  memory_size: 100000

agent:
  class: SAC
  gradient_steps: 1
  batch_size: 256

  discount_factor: 0.99
  polyak: 0.005
  actor_learning_rate: 3.0e-04
  critic_learning_rate: 3.0e-04
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.01

  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null

  random_timesteps: 0
  learning_starts: 10000

  grad_norm_clip: 1.0

  learn_entropy: True
  entropy_learning_rate: 1.0e-03
  initial_entropy_value: 0.08

  mixed_precision: False

  experiment:
    directory: "lynx_ball_in_cup_sac"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto

trainer:
  class: SequentialTrainer
  timesteps: 30000
  environment_info: log

